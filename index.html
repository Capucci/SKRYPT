<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Editor de Roteiros - Estilo Celtx</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: #ffd700;
        }

        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
            border: 1px solid #444;
            align-items: center;
        }

        .toolbar button {
            padding: 8px 16px;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            background: #333;
            color: #e0e0e0;
        }

        .toolbar button:hover {
            background: #444;
            border-color: #ffd700;
            color: #ffd700;
        }

        .toolbar button.active {
            background: #ffd700;
            color: #1a1a1a;
            border-color: #ffd700;
        }

        .btn-cena { background: #1a3a5c; border-color: #2a5a8c; }
        .btn-cena:hover { background: #2a5a8c; }

        .btn-personagem { background: #5c3a1a; border-color: #8c5a2a; }
        .btn-personagem:hover { background: #8c5a2a; }

        .btn-dialogo { background: #1a5c3a; border-color: #2a8c5a; }
        .btn-dialogo:hover { background: #2a8c5a; }

        .btn-acao { background: #3a3a5c; border-color: #5a5a8c; }
        .btn-acao:hover { background: #5a5a8c; }

        .btn-transicao { background: #5c1a3a; border-color: #8c2a5a; }
        .btn-transicao:hover { background: #8c2a5a; }

        .btn-parentese { background: #3a5c1a; border-color: #5a8c2a; }
        .btn-parentese:hover { background: #5a8c2a; }

        .btn-salvar { background: #2d5a27; border-color: #4a8c3f; }
        .btn-salvar:hover { background: #3a7a33; }

        .btn-pdf { background: #5a2d27; border-color: #8c4a3f; }
        .btn-pdf:hover { background: #7a3a33; }

        .toolbar input[type="text"] {
            background: #0d0d0d;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Segoe UI', sans-serif;
            flex: 1;
            min-width: 120px;
        }

        .toolbar .separator {
            width: 1px;
            height: 30px;
            background: #444;
            margin: 0 5px;
        }

        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 300px);
            min-height: 500px;
        }

        @media (max-width: 900px) {
            .editor-area {
                grid-template-columns: 1fr;
                height: auto;
            }
            .editor-panel, .preview-panel {
                height: 400px !important;
            }
        }

        .editor-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 15px;
            background: #252525;
            border-bottom: 1px solid #333;
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #editor {
            flex: 1;
            padding: 20px;
            background: #0d0d0d;
            color: #e0e0e0;
            border: none;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: none;
            min-height: 400px;
        }

        .preview-panel {
            background: #ffffff;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-panel .panel-header {
            background: #252525;
            color: #888;
        }

        #preview {
            flex: 1;
            padding: 30px 40px;
            background: #ffffff;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
            font-size: 12.5px;
            line-height: 1.6;
            overflow-y: auto;
            min-height: 400px;
            white-space: pre-wrap;
        }

        /* ESTILOS DO ROTEIRO */
        #preview .scene {
            text-transform: uppercase;
            font-weight: bold;
            margin: 20px 0 12px 0;
            text-align: left;
            font-size: 13px;
        }

        #preview .action {
            margin: 6px 0 10px 0;
            text-align: left;
            font-size: 12.5px;
            line-height: 1.6;
        }

        #preview .character {
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            margin: 18px 0 4px 0;
            font-size: 13px;
        }

        #preview .dialogue {
            margin: 0 auto 8px auto;
            padding-left: 30%;
            max-width: 70%;
            text-align: left;
            font-size: 12.5px;
            line-height: 1.6;
        }

        #preview .transition {
            text-transform: uppercase;
            text-align: right;
            margin: 15px 0 10px 0;
            font-size: 12.5px;
            font-weight: bold;
        }

        #preview .parenthetical {
            text-align: center;
            color: #666;
            font-style: italic;
            margin: 2px 0 2px 30%;
            font-size: 12px;
        }

        #preview .empty-line {
            height: 12px;
        }

        .status {
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-size: 13px;
        }

        .status.success {
            background: #0d2818;
            border: 1px solid #238636;
            color: #3fb950;
        }

        .status.error {
            background: #2d0f0f;
            border: 1px solid #da3633;
            color: #f85149;
        }

        .status.info {
            background: #0d1f2d;
            border: 1px solid #1f6feb;
            color: #58a6ff;
        }

        .file-list {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .file-list h3 {
            color: #888;
            font-size: 14px;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .file-item {
            padding: 4px 10px;
            margin: 3px 0;
            background: #252525;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .file-item .name {
            color: #e0e0e0;
            font-size: 12px;
        }

        .file-item button {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 2px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        /* Sugestões de autocompletar */
        .suggestions {
            position: absolute;
            background: #2a2a2a;
            border: 1px solid #555;
            border-radius: 4px;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            z-index: 1000;
            min-width: 200px;
        }

        .suggestions .suggestion-item {
            padding: 8px 15px;
            cursor: pointer;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .suggestions .suggestion-item:hover {
            background: #444;
            color: #ffd700;
        }

        .config-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px 15px;
            margin: 5px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 Editor de Roteiros</h1>
            <span style="color: #666; font-size: 12px;">Estilo Celtx</span>
        </header>

        <div class="status info" id="status">📁 Pronto para editar</div>

        <!-- TOOLBAR -->
        <div class="toolbar">
            <button class="btn-cena" onclick="inserirCena()">🎬 Cena</button>
            <button class="btn-personagem" onclick="inserirPersonagem()">👤 Personagem</button>
            <button class="btn-dialogo" onclick="inserirDialogo()">💬 Diálogo</button>
            <button class="btn-acao" onclick="inserirAcao()">📝 Ação</button>
            <button class="btn-transicao" onclick="inserirTransicao()">🔄 Transição</button>
            <button class="btn-parentese" onclick="inserirParentese()">( ) Parentético</button>
            
            <span class="separator"></span>
            
            <button class="btn-salvar" onclick="baixar()">⬇️ Baixar</button>
            <button class="btn-pdf" onclick="exportarPDF()">📄 PDF</button>
            
            <span class="separator"></span>
            
            <input type="text" id="nomeArquivo" value="meu-roteiro.fountain" placeholder="nome-do-arquivo">
            <button onclick="limpar()" style="background:#5a2727;border-color:#8c3f3f;">🗑️ Novo</button>
        </div>

        <!-- EDITOR + PREVIEW -->
        <div class="editor-area">
            <div class="editor-panel">
                <div class="panel-header">
                    <span>✍️ Editor</span>
                    <span id="charCount">0 caracteres</span>
                </div>
                <textarea id="editor" spellcheck="true"></textarea>
                <div class="suggestions" id="suggestions"></div>
            </div>
            <div class="preview-panel">
                <div class="panel-header">
                    <span>🎬 Preview</span>
                    <span>Visualização do Roteiro</span>
                </div>
                <div id="preview">👈 Escreva no editor ou use os botões</div>
            </div>
        </div>

        <!-- FILE LIST -->
        <div class="file-list">
            <h3>📁 Seus Roteiros</h3>
            <div id="files">Use "Baixar" para salvar seu roteiro</div>
        </div>
    </div>

    <script>
        // ============================================================
        // BANCO DE PERSONAGENS (autocompletar)
        // ============================================================
        let personagens = [];

        // ============================================================
        // FUNÇÕES DE INSERÇÃO
        // ============================================================
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const statusDiv = document.getElementById('status');
        const charCount = document.getElementById('charCount');

        function getCursorPosition() {
            return editor.selectionStart;
        }

        function setCursorPosition(pos) {
            editor.focus();
            editor.setSelectionRange(pos, pos);
        }

        function inserirTexto(texto, quebraLinha = true) {
            const pos = getCursorPosition();
            const antes = editor.value.substring(0, pos);
            const depois = editor.value.substring(pos);
            const novoTexto = quebraLinha ? texto + '\n' : texto;
            editor.value = antes + novoTexto + depois;
            setCursorPosition(pos + novoTexto.length);
            atualizarPreview();
            editor.focus();
        }

        function inserirCena() {
            const texto = prompt('📍 Digite o cabeçalho da cena:', 'INT. LOCAL - DIA');
            if (texto) {
                inserirTexto(texto.toUpperCase() + '\n');
                setStatus('🎬 Cena inserida!', 'success');
            }
        }

        function inserirPersonagem() {
            const nome = prompt('👤 Nome do personagem:', '');
            if (nome) {
                const nomeUpper = nome.toUpperCase().trim();
                // Adiciona ao banco de personagens se não existir
                if (!personagens.includes(nomeUpper)) {
                    personagens.push(nomeUpper);
                    personagens.sort();
                }
                inserirTexto(nomeUpper + '\n');
                setStatus(`👤 Personagem "${nomeUpper}" inserido!`, 'success');
            }
        }

        function inserirDialogo() {
            const texto = prompt('💬 Digite a fala do personagem:', '');
            if (texto) {
                inserirTexto(texto + '\n');
                setStatus('💬 Diálogo inserido!', 'success');
            }
        }

        function inserirAcao() {
            const texto = prompt('📝 Digite a ação/descrição:', '');
            if (texto) {
                inserirTexto(texto + '\n');
                setStatus('📝 Ação inserida!', 'success');
            }
        }

        function inserirTransicao() {
            const texto = prompt('🔄 Digite a transição:', 'TRANSIGÃO');
            if (texto) {
                inserirTexto(texto.toUpperCase() + '\n');
                setStatus('🔄 Transição inserida!', 'success');
            }
        }

        function inserirParentese() {
            const texto = prompt('( ) Digite o parentético:', '(para Sônia)');
            if (texto) {
                const parentese = texto.startsWith('(') ? texto : '(' + texto + ')';
                inserirTexto(parentese + '\n');
                setStatus('( ) Parentético inserido!', 'success');
            }
        }

        // ============================================================
        // AUTOCOMPLETAR DE PERSONAGENS
        // ============================================================
        editor.addEventListener('input', function(e) {
            const text = this.value;
            const pos = this.selectionStart;
            const before = text.substring(0, pos);
            const lines = before.split('\n');
            const currentLine = lines[lines.length - 1];
            
            // Verifica se está digitando no início da linha (personagem)
            const lineStart = before.lastIndexOf('\n') + 1;
            const isNewLine = before.length === lineStart || before.endsWith('\n');
            
            if (isNewLine && currentLine.length > 0) {
                const sugestoes = personagens.filter(p => 
                    p.startsWith(currentLine.toUpperCase())
                );
                
                const suggestionsDiv = document.getElementById('suggestions');
                if (sugestoes.length > 0) {
                    suggestionsDiv.style.display = 'block';
                    suggestionsDiv.innerHTML = sugestoes.map(s => 
                        `<div class="suggestion-item" onclick="completarSugestao('${s}')">${s}</div>`
                    ).join('');
                    
                    // Posiciona abaixo do cursor
                    const rect = editor.getBoundingClientRect();
                    suggestionsDiv.style.left = rect.left + 'px';
                    suggestionsDiv.style.top = (rect.top + 30) + 'px';
                } else {
                    suggestionsDiv.style.display = 'none';
                }
            } else {
                document.getElementById('suggestions').style.display = 'none';
            }
            
            atualizarPreview();
        });

        function completarSugestao(nome) {
            const text = editor.value;
            const pos = editor.selectionStart;
            const before = text.substring(0, pos);
            const after = text.substring(pos);
            const lines = before.split('\n');
            const lastLine = lines[lines.length - 1];
            
            // Substitui a linha atual pelo nome completo
            const beforeLastLine = before.substring(0, before.length - lastLine.length);
            editor.value = beforeLastLine + nome + after;
            
            const newPos = beforeLastLine.length + nome.length;
            editor.setSelectionRange(newPos, newPos);
            editor.focus();
            
            document.getElementById('suggestions').style.display = 'none';
            atualizarPreview();
        }

        // ============================================================
        // FORMATAÇÃO DO ROTEIRO
        // ============================================================
        function formatarRoteiro(texto) {
            if (!texto || !texto.trim()) return '👈 Escreva no editor ou use os botões';

            const linhas = texto.split('\n');
            let resultado = [];
            let emDialogo = false;

            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i];
                let linhaTrim = linha.trim();

                if (!linhaTrim) {
                    resultado.push('<div class="empty-line"></div>');
                    emDialogo = false;
                    continue;
                }

                // CENA
                if (/^(CENA|INT\.|EXT\.|I\/E\.)/i.test(linhaTrim) || /-[ ]*(DIA|NOITE|MANHÃ|TARDE|AMANHECER|ENTARDECER|NOITE)/i.test(linhaTrim)) {
                    resultado.push(`<div class="scene">${linhaTrim.toUpperCase()}</div>`);
                    emDialogo = false;
                    continue;
                }

                // TRANSIÇÃO
                if (/^[A-Z][A-Z\s]+:$/.test(linhaTrim) || /^[A-Z][A-Z\s]+ TO:$/.test(linhaTrim) || /^TRANS/I.test(linhaTrim)) {
                    resultado.push(`<div class="transition">${linhaTrim.toUpperCase()}</div>`);
                    emDialogo = false;
                    continue;
                }

                // PERSONAGEM (maiúsculo, não é cena/transição)
                if (linhaTrim === linhaTrim.toUpperCase() && 
                    linhaTrim.length > 1 && 
                    !/^(CENA|INT\.|EXT\.|I\/E\.)/i.test(linhaTrim) &&
                    !/^[A-Z][A-Z\s]+:$/.test(linhaTrim) &&
                    !/^TRANS/I.test(linhaTrim) &&
                    !linhaTrim.includes('(')) {
                    
                    resultado.push(`<div class="character">${linhaTrim}</div>`);
                    emDialogo = true;
                    continue;
                }

                // PARENTÉTICO
                if (linhaTrim.startsWith('(') && linhaTrim.endsWith(')')) {
                    resultado.push(`<div class="parenthetical">${linhaTrim}</div>`);
                    emDialogo = false;
                    continue;
                }

                // DIÁLOGO
                if (emDialogo && !linhaTrim.startsWith('(')) {
                    resultado.push(`<div class="dialogue">${linhaTrim}</div>`);
                    continue;
                }

                // AÇÃO
                resultado.push(`<div class="action">${linhaTrim}</div>`);
                emDialogo = false;
            }

            return resultado.join('\n');
        }

        function atualizarPreview() {
            const texto = editor.value;
            charCount.textContent = texto.length + ' caracteres';
            preview.innerHTML = formatarRoteiro(texto);
            
            // Atualiza lista de personagens automaticamente
            const lines = texto.split('\n');
            for (let line of lines) {
                const trimmed = line.trim();
                if (trimmed === trimmed.toUpperCase() && 
                    trimmed.length > 1 && 
                    !/^(CENA|INT\.|EXT\.|I\/E\.)/i.test(trimmed) &&
                    !/^[A-Z][A-Z\s]+:$/.test(trimmed) &&
                    !/^TRANS/I.test(trimmed) &&
                    !trimmed.includes('(') &&
                    !trimmed.includes(')')) {
                    if (!personagens.includes(trimmed)) {
                        personagens.push(trimmed);
                        personagens.sort();
                    }
                }
            }
        }

        editor.addEventListener('input', atualizarPreview);

        // ============================================================
        // FUNÇÕES AUXILIARES
        // ============================================================
        function setStatus(msg, tipo = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status ' + tipo;
        }

        function baixar() {
            const conteudo = editor.value;
            if (!conteudo) {
                setStatus('⚠️ Roteiro vazio!', 'error');
                return;
            }
            const blob = new Blob([conteudo], {type: 'text/plain;charset=utf-8'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = document.getElementById('nomeArquivo').value || 'meu-roteiro.fountain';
            link.click();
            setStatus('⬇️ Arquivo baixado!', 'success');
        }

        function exportarPDF() {
            setStatus('📄 Abrindo PDF...', 'info');
            
            const conteudoHTML = preview.innerHTML;
            const titulo = document.getElementById('nomeArquivo').value || 'Roteiro';
            
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>${titulo}</title>
                    <style>
                        body { 
                            font-family: 'Courier New', Courier, monospace; 
                            padding: 40px 50px; 
                            max-width: 800px; 
                            margin: 0 auto; 
                            background: white;
                            color: black;
                        }
                        .scene { text-transform: uppercase; font-weight: bold; margin: 20px 0 12px 0; text-align: left; font-size: 13px; }
                        .action { margin: 6px 0 10px 0; text-align: left; font-size: 12.5px; line-height: 1.6; }
                        .character { text-transform: uppercase; font-weight: bold; text-align: center; margin: 18px 0 4px 0; font-size: 13px; }
                        .dialogue { margin: 0 auto 8px auto; padding-left: 30%; max-width: 70%; text-align: left; font-size: 12.5px; line-height: 1.6; }
                        .transition { text-transform: uppercase; text-align: right; margin: 15px 0 10px 0; font-size: 12.5px; font-weight: bold; }
                        .parenthetical { text-align: center; color: #666; font-style: italic; margin: 2px 0 2px 30%; font-size: 12px; }
                        .empty-line { height: 12px; }
                        @media print {
                            body { padding: 30px 40px; }
                            .dialogue { padding-left: 28%; max-width: 72%; }
                        }
                    </style>
                </head>
                <body>
                    ${conteudoHTML}
                    <script>
                        window.onload = function() { 
                            setTimeout(function() { window.print(); }, 500);
                        }
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
            setStatus('📄 PDF gerado! Use "Salvar como PDF" no navegador.', 'success');
        }

        function limpar() {
            if (editor.value && !confirm('Tem certeza? O conteúdo atual será perdido.')) return;
            editor.value = '';
            atualizarPreview();
            setStatus('📝 Novo roteiro criado', 'info');
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        // Texto de exemplo
        editor.value = `CENA 01 DELEGACIA - INT - DIA

Em uma comemoração na delegacia o delegado parabeniza SÔNIA:

DELEGADO BRANDÃO
Parabéns policial Sônia Falcão, você conseguiu em um mês o que vários de nossos policiais vem tentando há anos.

SÔNIA
Delegado Brandão, só fiz o meu dever.

POLICIAL TORRES fica observando com raiva e sai prá lá.

DELEGADO BRANDÃO

TRANSIGÃO`;

        // Inicializa lista de personagens
        const lines = editor.value.split('\n');
        for (let line of lines) {
            const trimmed = line.trim();
            if (trimmed === trimmed.toUpperCase() && 
                trimmed.length > 1 && 
                !/^(CENA|INT\.|EXT\.|I\/E\.)/i.test(trimmed) &&
                !/^[A-Z][A-Z\s]+:$/.test(trimmed) &&
                !/^TRANS/I.test(trimmed) &&
                !trimmed.includes('(') &&
                !trimmed.includes(')')) {
                if (!personagens.includes(trimmed)) {
                    personagens.push(trimmed);
                }
            }
        }
        personagens.sort();

        atualizarPreview();
        setStatus('🎬 Editor estilo Celtx carregado! Use os botões para criar seu roteiro.', 'success');

        console.log('🎬 Editor estilo Celtx carregado!');
        console.log('👤 Personagens:', personagens);
    </script>
</body>
</html>
