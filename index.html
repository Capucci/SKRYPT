<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Editor de Roteiros Profissional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1a1a1a;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 2px solid #333;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            color: #ffd700;
            font-weight: normal;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .toolbar button {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            transition: all 0.2s;
        }

        .toolbar button:hover {
            background: #444;
            border-color: #ffd700;
            color: #ffd700;
        }

        .toolbar button.primary {
            background: #2d5a27;
            border-color: #4a8c3f;
        }

        .toolbar button.primary:hover {
            background: #3a7a33;
        }

        .toolbar button.danger {
            background: #5a2727;
            border-color: #8c3f3f;
        }

        .toolbar button.danger:hover {
            background: #7a3333;
        }

        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: calc(100vh - 250px);
            min-height: 500px;
        }

        @media (max-width: 900px) {
            .editor-area {
                grid-template-columns: 1fr;
                height: auto;
            }
            .editor-panel, .preview-panel {
                height: 400px !important;
            }
        }

        .editor-panel {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 10px 15px;
            background: #252525;
            border-bottom: 1px solid #333;
            font-size: 12px;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header .badge {
            color: #ffd700;
            font-size: 11px;
        }

        #editor {
            flex: 1;
            padding: 20px;
            background: #0d0d0d;
            color: #e0e0e0;
            border: none;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.8;
            resize: none;
            min-height: 400px;
        }

        .preview-panel {
            background: #ffffff;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .preview-panel .panel-header {
            background: #252525;
            color: #888;
        }

        .preview-panel .panel-header .badge {
            color: #4a8c3f;
        }

        #preview {
            flex: 1;
            padding: 20px;
            background: #f5f0e8;
            color: #1a1a1a;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.8;
            overflow-y: auto;
            min-height: 400px;
            white-space: pre-wrap;
        }

        /* Estilos para o preview do roteiro */
        .scene-header {
            text-transform: uppercase;
            font-weight: bold;
            margin: 15px 0 10px 0;
            color: #1a1a1a;
        }

        .action {
            margin: 8px 0;
            color: #1a1a1a;
        }

        .character {
            text-transform: uppercase;
            font-weight: bold;
            text-align: center;
            margin: 15px 0 5px 0;
            color: #1a1a1a;
        }

        .dialogue {
            margin: 0 auto 10px auto;
            padding-left: 30%;
            max-width: 70%;
            color: #1a1a1a;
        }

        .transition {
            text-transform: uppercase;
            text-align: right;
            margin: 15px 0 10px 0;
            color: #1a1a1a;
        }

        .parenthetical {
            text-align: center;
            color: #666;
            font-style: italic;
            margin: 2px 0 2px 30%;
        }

        .status {
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .status.success {
            background: #0d2818;
            border: 1px solid #238636;
            color: #3fb950;
        }

        .status.error {
            background: #2d0f0f;
            border: 1px solid #da3633;
            color: #f85149;
        }

        .status.info {
            background: #0d1f2d;
            border: 1px solid #1f6feb;
            color: #58a6ff;
        }

        .status.warning {
            background: #1e1a0d;
            border: 1px solid #d29922;
            color: #e3b341;
        }

        .file-list {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }

        .file-list h3 {
            color: #888;
            font-size: 14px;
            font-weight: normal;
            margin-bottom: 10px;
        }

        .file-item {
            padding: 6px 12px;
            margin: 4px 0;
            background: #252525;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #333;
        }

        .file-item:hover {
            border-color: #555;
        }

        .file-item .name {
            color: #e0e0e0;
            font-size: 13px;
        }

        .file-item button {
            background: #333;
            color: #e0e0e0;
            border: 1px solid #555;
            padding: 2px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Courier New', monospace;
        }

        .file-item button:hover {
            background: #444;
            border-color: #ffd700;
        }

        .file-item button.danger {
            background: #5a2727;
            border-color: #8c3f3f;
        }

        .file-item button.danger:hover {
            background: #7a3333;
        }

        .config-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
        }

        .config-box label {
            display: block;
            margin: 5px 0 2px 0;
            font-size: 12px;
            color: #888;
        }

        .config-box input {
            background: #0d0d0d;
            color: #e0e0e0;
            border: 1px solid #333;
            padding: 6px 10px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            width: 100%;
            margin-bottom: 8px;
        }

        .config-box input:focus {
            border-color: #ffd700;
            outline: none;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) {
            .config-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 SKRYPT - Editor de Roteiros</h1>
            <span style="color: #666; font-size: 12px;">Formatação Fountain</span>
        </header>

        <!-- Status -->
        <div class="status info" id="status">📁 Pronto para editar</div>

        <!-- Configuração -->
        <div class="config-box">
            <div class="config-row">
                <div>
                    <label>👤 Username (REPO_OWNER)</label>
                    <input type="text" id="configOwner" placeholder="Seu username do GitHub">
                </div>
                <div>
                    <label>📁 Repositório (REPO_NAME)</label>
                    <input type="text" id="configRepo" placeholder="Nome do repositório">
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 5px;">
                <button onclick="atualizarConfig()" style="background: #333; color: #e0e0e0; border: 1px solid #555; padding: 6px 15px; border-radius: 4px; cursor: pointer;">✅ Atualizar</button>
                <button onclick="testarConexao()" style="background: #333; color: #e0e0e0; border: 1px solid #555; padding: 6px 15px; border-radius: 4px; cursor: pointer;">🔗 Testar</button>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <input type="text" id="nomeArquivo" value="meu-roteiro.fountain" placeholder="nome-do-roteiro.fountain" style="background: #0d0d0d; color: #e0e0e0; border: 1px solid #333; padding: 6px 12px; border-radius: 4px; font-family: 'Courier New', monospace; flex: 1; min-width: 150px;">
            <button class="primary" onclick="salvar()">💾 Salvar</button>
            <button onclick="carregar()">📂 Carregar</button>
            <button onclick="listarArquivos()">📋 Listar</button>
            <button onclick="baixar()">⬇️ Baixar</button>
            <button onclick="exportarPDF()">📄 PDF</button>
            <button class="danger" onclick="limpar()">🗑️ Novo</button>
        </div>

        <!-- Editor Area -->
        <div class="editor-area">
            <div class="editor-panel">
                <div class="panel-header">
                    <span>✍️ Editor</span>
                    <span class="badge" id="charCount">0 caracteres</span>
                </div>
                <textarea id="editor" spellcheck="true" placeholder="Escreva seu roteiro no formato Fountain...

INT. DELEGACIA - DIA

Em uma comemoração na delegacia, o delegado parabeniza SÔNIA.

DELEGADO BRANDÃO
Parabéns policial Sônia Falcão, você conseguiu em um mês o que vários de nossos policiais vem tentando há anos.

SÔNIA
Delegado Brandão, só fiz o meu dever.

POLICIAL TORRES fica observando com raiva e sai pra lá.

DELEGADO BRANDÃO
(para Sônia)
Você é uma grande policial.

TRANSIGÃO

REGras de formatação:
• CENAS: INT./EXT. + LOCAL + - + PERÍODO (tudo MAIÚSCULO)
• AÇÃO: descrição normal
• PERSONAGEM: MAIÚSCULO, alinhado ao centro
• FALA: indentada à esquerda
• PARENTÉTICO: (entre parênteses)
• TRANSIÇÃO: MAIÚSCULO, alinhado à direita"></textarea>
            </div>
            <div class="preview-panel">
                <div class="panel-header">
                    <span>🎬 Preview</span>
                    <span class="badge">Visualização do Roteiro</span>
                </div>
                <div id="preview">👈 Escreva no editor para ver a prévia formatada</div>
            </div>
        </div>

        <!-- File List -->
        <div class="file-list">
            <h3>📁 Seus Roteiros</h3>
            <div id="files">Clique em "Listar" para ver seus arquivos</div>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURAÇÃO - MUDE AQUI SE NECESSÁRIO
        // ============================================================
        let REPO_OWNER = '';
        let REPO_NAME = '';
        const PASTA = 'roteiros/';
        let token = '';

        // ============================================================
        // FORMATAÇÃO DE ROTEIRO (Fountain)
        // ============================================================
        function formatarRoteiro(texto) {
            if (!texto.trim()) return '👈 Escreva no editor para ver a prévia formatada';

            const linhas = texto.split('\n');
            let resultado = [];
            let emDialogo = false;
            let personagemAtual = '';

            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i];
                let linhaTrim = linha.trim();

                // Pula linhas vazias
                if (!linhaTrim) {
                    resultado.push('');
                    emDialogo = false;
                    continue;
                }

                // ===== CENA =====
                // Começa com INT./EXT. e termina com - DIA/NOITE
                if (/^(INT\.|EXT\.|I\/E\.)/i.test(linhaTrim) && /-[ ]*(DIA|NOITE|MANHÃ|TARDE|AMANHECER|ENTARDECER|NOITE|DAY|NIGHT)/i.test(linhaTrim)) {
                    resultado.push(`<div class="scene-header">${linhaTrim.toUpperCase()}</div>`);
                    emDialogo = false;
                    continue;
                }

                // ===== TRANSIÇÃO =====
                // Termina com : ou TO: ou está em maiúsculas no final
                if (/^[A-Z][A-Z\s]+:$/.test(linhaTrim) || /^[A-Z][A-Z\s]+ TO:$/.test(linhaTrim) || /^[A-Z][A-Z\s]+ TO [A-Z]/.test(linhaTrim)) {
                    resultado.push(`<div class="transition">${linhaTrim}</div>`);
                    emDialogo = false;
                    continue;
                }

                // ===== PERSONAGEM =====
                // Está em maiúsculas e NÃO é uma cena/transição
                if (linhaTrim === linhaTrim.toUpperCase() && 
                    linhaTrim.length > 1 && 
                    !/^(INT\.|EXT\.|I\/E\.)/i.test(linhaTrim) &&
                    !/^[A-Z][A-Z\s]+:$/.test(linhaTrim) &&
                    !/^[A-Z][A-Z\s]+ TO:$/.test(linhaTrim)) {
                    
                    // Verifica se é um parentético na mesma linha
                    if (linhaTrim.includes('(') && linhaTrim.includes(')')) {
                        // É um parentético, não é personagem
                        resultado.push(`<div class="parenthetical">${linhaTrim}</div>`);
                        emDialogo = false;
                        continue;
                    }
                    
                    resultado.push(`<div class="character">${linhaTrim}</div>`);
                    personagemAtual = linhaTrim;
                    emDialogo = true;
                    continue;
                }

                // ===== PARENTÉTICO =====
                if (linhaTrim.startsWith('(') && linhaTrim.endsWith(')')) {
                    resultado.push(`<div class="parenthetical">${linhaTrim}</div>`);
                    emDialogo = false;
                    continue;
                }

                // ===== DIALOGO (FALA) =====
                if (emDialogo && !linhaTrim.startsWith('(')) {
                    resultado.push(`<div class="dialogue">${linhaTrim}</div>`);
                    continue;
                }

                // ===== AÇÃO (DESCRIÇÃO) =====
                resultado.push(`<div class="action">${linhaTrim}</div>`);
                emDialogo = false;
            }

            return resultado.join('\n');
        }

        // ============================================================
        // PREVIEW EM TEMPO REAL
        // ============================================================
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const statusDiv = document.getElementById('status');
        const charCount = document.getElementById('charCount');

        editor.addEventListener('input', function() {
            const texto = this.value;
            charCount.textContent = texto.length + ' caracteres';
            preview.innerHTML = formatarRoteiro(texto);
        });

        // ============================================================
        // FUNÇÕES GITHUB
        // ============================================================
        function setStatus(msg, tipo = 'info') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status ' + tipo;
        }

        function getToken() {
            if (token) return token;
            token = prompt('🔑 Digite seu GitHub Personal Access Token:');
            if (!token) {
                setStatus('❌ Token necessário!', 'error');
                throw new Error('Token não fornecido');
            }
            return token;
        }

        function atualizarConfig() {
            REPO_OWNER = document.getElementById('configOwner').value.trim();
            REPO_NAME = document.getElementById('configRepo').value.trim();
            
            if (REPO_OWNER && REPO_NAME) {
                setStatus(`✅ Config: ${REPO_OWNER}/${REPO_NAME}`, 'success');
            } else {
                setStatus('⚠️ Preencha username e repositório', 'warning');
            }
        }

        async function testarConexao() {
            if (!REPO_OWNER || !REPO_NAME) {
                setStatus('⚠️ Configure o repositório primeiro!', 'warning');
                return;
            }

            const tokenAtual = getToken();
            setStatus('⏳ Testando...', 'info');

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });

                if (response.ok) {
                    setStatus('✅ Conexão OK!', 'success');
                } else {
                    const error = await response.json();
                    setStatus(`❌ Erro: ${error.message}`, 'error');
                }
            } catch (error) {
                setStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }

        async function salvar() {
            if (!REPO_OWNER || !REPO_NAME) {
                setStatus('⚠️ Configure o repositório primeiro!', 'warning');
                return;
            }

            const nome = document.getElementById('nomeArquivo').value.trim() || 'meu-roteiro.fountain';
            const conteudo = editor.value;
            
            if (!conteudo) {
                setStatus('⚠️ Roteiro vazio!', 'error');
                return;
            }

            const tokenAtual = getToken();
            setStatus('⏳ Salvando...', 'info');

            try {
                let sha = null;
                try {
                    const check = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                        headers: { 'Authorization': `token ${tokenAtual}` }
                    });
                    if (check.ok) {
                        const data = await check.json();
                        sha = data.sha;
                    }
                } catch (e) {}

                const contentBase64 = btoa(unescape(encodeURIComponent(conteudo)));

                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${tokenAtual}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Salvando roteiro: ${nome}`,
                        content: contentBase64,
                        sha: sha
                    })
                });

                if (response.ok) {
                    setStatus(`✅ "${nome}" salvo com sucesso!`, 'success');
                    listarArquivos();
                } else {
                    const error = await response.json();
                    setStatus(`❌ Erro: ${error.message || 'Falha ao salvar'}`, 'error');
                }
            } catch (error) {
                setStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }

        async function carregar() {
            if (!REPO_OWNER || !REPO_NAME) {
                setStatus('⚠️ Configure o repositório primeiro!', 'warning');
                return;
            }

            const nome = prompt('📂 Qual arquivo carregar?', 'meu-roteiro.fountain');
            if (!nome) return;

            const tokenAtual = getToken();
            setStatus(`⏳ Carregando...`, 'info');

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });

                if (!response.ok) throw new Error('Arquivo não encontrado');

                const data = await response.json();
                const conteudo = decodeURIComponent(escape(atob(data.content)));
                
                editor.value = conteudo;
                document.getElementById('nomeArquivo').value = nome;
                preview.innerHTML = formatarRoteiro(conteudo);
                charCount.textContent = conteudo.length + ' caracteres';
                
                setStatus(`✅ "${nome}" carregado!`, 'success');
            } catch (error) {
                setStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }

        async function listarArquivos() {
            if (!REPO_OWNER || !REPO_NAME) {
                setStatus('⚠️ Configure o repositório primeiro!', 'warning');
                return;
            }

            setStatus('⏳ Listando...', 'info');

            try {
                const tokenAtual = getToken();
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });

                if (!response.ok) {
                    document.getElementById('files').innerHTML = `<p style="color: #888;">📁 Nenhum roteiro encontrado</p>`;
                    setStatus('📁 Pasta vazia', 'warning');
                    return;
                }

                const files = await response.json();
                
                if (files.length === 0) {
                    document.getElementById('files').innerHTML = `<p style="color: #888;">📁 Nenhum roteiro encontrado</p>`;
                    return;
                }

                document.getElementById('files').innerHTML = files.map(file => `
                    <div class="file-item">
                        <span class="name">📄 ${file.name}</span>
                        <div>
                            <button onclick="carregarArquivo('${file.name}')">Abrir</button>
                            <button class="danger" onclick="deletarArquivo('${file.name}')">🗑️</button>
                        </div>
                    </div>
                `).join('');
                
                setStatus(`📁 ${files.length} arquivos encontrados`, 'success');
            } catch (error) {
                document.getElementById('files').innerHTML = `<p style="color: #888;">❌ Erro ao listar</p>`;
                setStatus(`❌ Erro`, 'error');
            }
        }

        async function carregarArquivo(nome) {
            const tokenAtual = getToken();
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });
                const data = await response.json();
                const conteudo = decodeURIComponent(escape(atob(data.content)));
                editor.value = conteudo;
                document.getElementById('nomeArquivo').value = nome;
                preview.innerHTML = formatarRoteiro(conteudo);
                charCount.textContent = conteudo.length + ' caracteres';
                setStatus(`✅ "${nome}" carregado!`, 'success');
            } catch (error) {
                setStatus(`❌ Erro ao carregar`, 'error');
            }
        }

        async function deletarArquivo(nome) {
            if (!confirm(`Tem certeza que quer deletar "${nome}"?`)) return;
            
            const tokenAtual = getToken();
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });
                const data = await response.json();

                const deleteResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${tokenAtual}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Deletando ${nome}`,
                        sha: data.sha
                    })
                });

                if (deleteResponse.ok) {
                    setStatus(`✅ "${nome}" deletado!`, 'success');
                    listarArquivos();
                }
            } catch (error) {
                setStatus(`❌ Erro ao deletar`, 'error');
            }
        }

        function baixar() {
            const conteudo = editor.value;
            if (!conteudo) {
                setStatus('⚠️ Roteiro vazio!', 'error');
                return;
            }
            const blob = new Blob([conteudo], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = document.getElementById('nomeArquivo').value || 'meu-roteiro.fountain';
            link.click();
            setStatus('⬇️ Arquivo baixado', 'success');
        }

        function exportarPDF() {
            setStatus('📄 Gerando PDF...', 'info');
            // Abre uma janela com o preview para imprimir como PDF
            const conteudo = preview.innerHTML;
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Roteiro</title>
                    <style>
                        body { font-family: 'Courier New', monospace; padding: 40px; max-width: 800px; margin: 0 auto; }
                        .scene-header { text-transform: uppercase; font-weight: bold; margin: 15px 0 10px 0; }
                        .action { margin: 8px 0; }
                        .character { text-transform: uppercase; font-weight: bold; text-align: center; margin: 15px 0 5px 0; }
                        .dialogue { margin: 0 auto 10px auto; padding-left: 30%; max-width: 70%; }
                        .transition { text-transform: uppercase; text-align: right; margin: 15px 0 10px 0; }
                        .parenthetical { text-align: center; color: #666; font-style: italic; margin: 2px 0 2px 30%; }
                        @media print { body { padding: 20px; } }
                    </style>
                </head>
                <body>
                    ${conteudo}
                    <script>
                        window.onload = function() { window.print(); }
                    <\/script>
                </body>
                </html>
            `);
            win.document.close();
            setStatus('📄 PDF gerado! Use "Salvar como PDF" no navegador.', 'success');
        }

        function limpar() {
            if (editor.value && !confirm('Tem certeza? O conteúdo atual será perdido.')) return;
            editor.value = '';
            preview.innerHTML = '👈 Escreva no editor para ver a prévia formatada';
            charCount.textContent = '0 caracteres';
            setStatus('📝 Novo roteiro criado', 'info');
        }

        // ============================================================
        // INICIALIZAÇÃO
        // ============================================================
        // Detecta automaticamente da URL
        const urlParts = window.location.href.split('/');
        const detectedOwner = urlParts[2]?.split('.')[0];
        const detectedRepo = urlParts[3] || '';
        
        if (detectedOwner && detectedOwner !== 'github.io') {
            document.getElementById('configOwner').value = detectedOwner;
            document.getElementById('configRepo').value = detectedRepo;
            REPO_OWNER = detectedOwner;
            REPO_NAME = detectedRepo;
            setStatus(`📁 ${REPO_OWNER}/${REPO_NAME}`, 'success');
        }

        // Preview inicial
        setTimeout(() => {
            if (editor.value) {
                preview.innerHTML = formatarRoteiro(editor.value);
            }
        }, 100);

        console.log('🎬 Editor de Roteiros Profissional carregado!');
    </script>
</body>
</html>
