<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>🎬 Editor de Roteiros</title>
    <style>
        body {
            background: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 { color: #ffd700; }
        .toolbar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        .toolbar button {
            padding: 8px 16px;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            background: #333;
            color: #e0e0e0;
        }
        .toolbar button:hover {
            border-color: #ffd700;
            color: #ffd700;
        }
        .editor-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            height: 500px;
        }
        #editor {
            width: 100%;
            height: 100%;
            padding: 15px;
            background: #0d0d0d;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: none;
        }
        #preview {
            height: 100%;
            padding: 20px;
            background: #ffffff;
            color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .status {
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            background: #0d1f2d;
            border: 1px solid #1f6feb;
            color: #58a6ff;
        }
        .scene { text-transform: uppercase; font-weight: bold; margin: 15px 0 10px 0; }
        .action { margin: 5px 0; }
        .character { text-transform: uppercase; font-weight: bold; text-align: center; margin: 15px 0 5px 0; }
        .dialogue { margin: 0 auto 5px auto; padding-left: 30%; max-width: 70%; }
        .transition { text-transform: uppercase; text-align: right; margin: 15px 0 10px 0; font-weight: bold; }
        .parenthetical { text-align: center; color: #666; font-style: italic; margin: 2px 0 2px 30%; }
        .empty-line { height: 10px; }
        @media (max-width: 700px) {
            .editor-area { grid-template-columns: 1fr; height: auto; }
            #editor { height: 300px; }
            #preview { height: 300px; }
        }
    </style>
</head>
<body>

    <h1>🎬 Editor de Roteiros</h1>

    <div class="status" id="status">📁 Pronto para editar</div>

    <div class="toolbar">
        <button onclick="inserirCena()">🎬 Cena</button>
        <button onclick="inserirPersonagem()">👤 Personagem</button>
        <button onclick="inserirDialogo()">💬 Diálogo</button>
        <button onclick="inserirAcao()">📝 Ação</button>
        <button onclick="inserirTransicao()">🔄 Transição</button>
        <button onclick="exportarPDF()">📄 PDF</button>
        <button onclick="baixar()">⬇️ Baixar</button>
        <button onclick="limpar()" style="background:#5a2727;border-color:#8c3f3f;">🗑️ Novo</button>
    </div>

    <div class="editor-area">
        <textarea id="editor" spellcheck="true"></textarea>
        <div id="preview">👈 Use os botões para criar seu roteiro</div>
    </div>

    <script>
        // ============================================================
        // ELEMENTOS
        // ============================================================
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const statusDiv = document.getElementById('status');

        // ============================================================
        // INSERIR TEXTOS
        // ============================================================
        function inserirTexto(texto) {
            const pos = editor.selectionStart;
            const antes = editor.value.substring(0, pos);
            const depois = editor.value.substring(pos);
            editor.value = antes + texto + '\n' + depois;
            const novaPos = pos + texto.length + 1;
            editor.setSelectionRange(novaPos, novaPos);
            editor.focus();
            atualizarPreview();
        }

        function inserirCena() {
            const texto = prompt('📍 Cabeçalho da cena (ex: INT. DELEGACIA - DIA):', '');
            if (texto) { inserirTexto(texto.toUpperCase()); status('🎬 Cena inserida!', 'success'); }
        }

        function inserirPersonagem() {
            const texto = prompt('👤 Nome do personagem:', '');
            if (texto) { inserirTexto(texto.toUpperCase()); status('👤 Personagem inserido!', 'success'); }
        }

        function inserirDialogo() {
            const texto = prompt('💬 Fala do personagem:', '');
            if (texto) { inserirTexto(texto); status('💬 Diálogo inserido!', 'success'); }
        }

        function inserirAcao() {
            const texto = prompt('📝 Descrição da ação:', '');
            if (texto) { inserirTexto(texto); status('📝 Ação inserida!', 'success'); }
        }

        function inserirTransicao() {
            const texto = prompt('🔄 Transição:', 'TRANSIGÃO');
            if (texto) { inserirTexto(texto.toUpperCase()); status('🔄 Transição inserida!', 'success'); }
        }

        // ============================================================
        // FORMATAÇÃO
        // ============================================================
        function formatar(texto) {
            if (!texto || !texto.trim()) return '👈 Use os botões para criar seu roteiro';

            const linhas = texto.split('\n');
            let resultado = [];
            let emDialogo = false;

            for (let i = 0; i < linhas.length; i++) {
                let linha = linhas[i];
                let linhaTrim = linha.trim();

                if (!linhaTrim) {
                    resultado.push('<div class="empty-line"></div>');
                    emDialogo = false;
                    continue;
                }

                // CENA
                if (/^(CENA|INT\.|EXT\.)/i.test(linhaTrim) || /-[ ]*(DIA|NOITE|MANHÃ|TARDE)/i.test(linhaTrim)) {
                    resultado.push(`<div class="scene">${linhaTrim.toUpperCase()}</div>`);
                    emDialogo = false;
                    continue;
                }

                // TRANSIÇÃO
                if (/^[A-Z][A-Z\s]+:$/.test(linhaTrim) || /^TRANS/I.test(linhaTrim)) {
                    resultado.push(`<div class="transition">${linhaTrim.toUpperCase()}</div>`);
                    emDialogo = false;
                    continue;
                }

                // PERSONAGEM
                if (linhaTrim === linhaTrim.toUpperCase() && 
                    linhaTrim.length > 1 && 
                    !/^(CENA|INT\.|EXT\.)/i.test(linhaTrim) &&
                    !/^[A-Z][A-Z\s]+:$/.test(linhaTrim) &&
                    !/^TRANS/I.test(linhaTrim) &&
                    !linhaTrim.includes('(')) {
                    resultado.push(`<div class="character">${linhaTrim}</div>`);
                    emDialogo = true;
                    continue;
                }

                // PARENTÉTICO
                if (linhaTrim.startsWith('(') && linhaTrim.endsWith(')')) {
                    resultado.push(`<div class="parenthetical">${linhaTrim}</div>`);
                    emDialogo = false;
                    continue;
                }

                // DIÁLOGO
                if (emDialogo && !linhaTrim.startsWith('(')) {
                    resultado.push(`<div class="dialogue">${linhaTrim}</div>`);
                    continue;
                }

                // AÇÃO
                resultado.push(`<div class="action">${linhaTrim}</div>`);
                emDialogo = false;
            }

            return resultado.join('\n');
        }

        function atualizarPreview() {
            preview.innerHTML = formatar(editor.value);
        }

        editor.addEventListener('input', atualizarPreview);

        // ============================================================
        // STATUS
        // ============================================================
        function status(msg, tipo = 'info') {
            statusDiv.textContent = msg;
            statusDiv.style.borderColor = tipo === 'success' ? '#238636' : '#1f6feb';
            statusDiv.style.color = tipo === 'success' ? '#3fb950' : '#58a6ff';
            setTimeout(() => {
                statusDiv.textContent = '📁 Pronto para editar';
                statusDiv.style.borderColor = '#1f6feb';
                statusDiv.style.color = '#58a6ff';
            }, 3000);
        }

        // ============================================================
        // EXPORTAR
        // ============================================================
        function baixar() {
            if (!editor.value) { status('⚠️ Roteiro vazio!', 'error'); return; }
            const blob = new Blob([editor.value], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'meu-roteiro.fountain';
            link.click();
            status('⬇️ Arquivo baixado!', 'success');
        }

        function exportarPDF() {
            const html = preview.innerHTML;
            if (!html || html.includes('Use os botões')) {
                status('⚠️ Escreva algo no roteiro!', 'error');
                return;
            }
            status('📄 Abrindo PDF...', 'info');
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Meu Roteiro</title>
                    <style>
                        body { font-family: 'Courier New', monospace; padding: 40px 50px; max-width: 800px; margin: 0 auto; background: white; color: black; }
                        .scene { text-transform: uppercase; font-weight: bold; margin: 20px 0 12px 0; text-align: left; font-size: 13px; }
                        .action { margin: 6px 0 10px 0; text-align: left; font-size: 12.5px; line-height: 1.6; }
                        .character { text-transform: uppercase; font-weight: bold; text-align: center; margin: 18px 0 4px 0; font-size: 13px; }
                        .dialogue { margin: 0 auto 8px auto; padding-left: 30%; max-width: 70%; text-align: left; font-size: 12.5px; line-height: 1.6; }
                        .transition { text-transform: uppercase; text-align: right; margin: 15px 0 10px 0; font-size: 12.5px; font-weight: bold; }
                        .parenthetical { text-align: center; color: #666; font-style: italic; margin: 2px 0 2px 30%; font-size: 12px; }
                        .empty-line { height: 12px; }
                        @media print { body { padding: 30px 40px; } .dialogue { padding-left: 28%; max-width: 72%; } }
                    </style>
                </head>
                <body>
                    ${html}
                    <script>window.onload = function() { setTimeout(window.print, 500); }<\/script>
                </body>
                </html>
            `);
            win.document.close();
            status('📄 PDF gerado!', 'success');
        }

        function limpar() {
            if (editor.value && !confirm('Tem certeza?')) return;
            editor.value = '';
            atualizarPreview();
            status('📝 Novo roteiro', 'success');
        }

        // ============================================================
        // INICIALIZAR
        // ============================================================
        editor.value = `CENA 01 DELEGACIA - INT - DIA

Em uma comemoração na delegacia o delegado parabeniza SÔNIA:

DELEGADO BRANDÃO
Parabéns policial Sônia Falcão, você conseguiu em um mês o que vários de nossos policiais vem tentando há anos.

SÔNIA
Delegado Brandão, só fiz o meu dever.

POLICIAL TORRES fica observando com raiva e sai prá lá.

DELEGADO BRANDÃO

TRANSIGÃO`;

        atualizarPreview();
        console.log('🎬 Editor carregado!');
    </script>

</body>
</html>
