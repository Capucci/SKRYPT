<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✍️ Editor de Roteiros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #0d1117;
            color: #c9d1d9;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px;
            font-family: monospace;
            font-size: 14px;
            border-radius: 6px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background: #2ea043;
        }
        button.danger {
            background: #da3633;
        }
        button.danger:hover {
            background: #f85149;
        }
        input {
            background: #161b22;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 8px 12px;
            border-radius: 6px;
            flex: 1;
            min-width: 150px;
        }
        .status {
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 6px;
            background: #0d1f2d;
            border: 1px solid #1f6feb;
        }
        .status.success {
            border-color: #238636;
            background: #0d2818;
            color: #3fb950;
        }
        .status.error {
            border-color: #da3633;
            background: #2d0f0f;
            color: #f85149;
        }
        .file-list {
            margin-top: 15px;
            background: #161b22;
            border-radius: 6px;
            padding: 15px;
            border: 1px solid #30363d;
        }
        .file-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: #0d1117;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .file-item button {
            padding: 4px 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>✍️ Editor de Roteiros</h1>
    
    <div class="status" id="status">📁 Pronto para editar</div>
    
    <div class="toolbar">
        <input type="text" id="nomeArquivo" value="meu-roteiro.txt" placeholder="nome-do-arquivo.txt">
        <button onclick="salvar()">💾 Salvar</button>
        <button onclick="carregar()">📂 Carregar</button>
        <button onclick="baixar()">⬇️ Baixar</button>
        <button class="danger" onclick="limpar()">🗑️ Novo</button>
    </div>
    
    <textarea id="editor" placeholder="Escreva seu roteiro aqui..."></textarea>
    
    <div class="file-list">
        <h3>📁 Seus Roteiros</h3>
        <div id="fileList">
            <button onclick="listarArquivos()" style="margin: 5px 0;">🔄 Atualizar lista</button>
            <div id="files"></div>
        </div>
    </div>

    <script>
        // 🔧 CONFIGURE AQUI COM SEUS DADOS
        const REPO_OWNER = 'Capucci';      // ← SEU USERNAME
        const REPO_NAME = 'SKRYPT';        // ← NOME DO REPOSITÓRIO
        const PASTA = 'roteiros/';         // ← NOME DA PASTA
        
        // Variáveis
        let token = '';
        const editor = document.getElementById('editor');
        const statusDiv = document.getElementById('status');
        const nomeArquivo = document.getElementById('nomeArquivo');
        const filesDiv = document.getElementById('files');

        function setStatus(msg, tipo = '') {
            statusDiv.textContent = msg;
            statusDiv.className = 'status ' + tipo;
        }

        function getToken() {
            if (token) return token;
            token = prompt('🔑 Digite seu GitHub Personal Access Token:');
            if (!token) {
                setStatus('❌ Token necessário para salvar', 'error');
                throw new Error('Token não fornecido');
            }
            return token;
        }

        async function salvar() {
            const nome = nomeArquivo.value.trim() || 'meu-roteiro.txt';
            const conteudo = editor.value;
            
            if (!conteudo) {
                setStatus('⚠️ Roteiro vazio!', 'error');
                return;
            }

            const tokenAtual = getToken();
            setStatus('⏳ Salvando...');

            try {
                // Verifica se o arquivo já existe
                let sha = null;
                try {
                    const check = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                        headers: { 'Authorization': `token ${tokenAtual}` }
                    });
                    if (check.ok) {
                        const data = await check.json();
                        sha = data.sha;
                    }
                } catch (e) {}

                // Prepara o conteúdo
                const contentBase64 = btoa(unescape(encodeURIComponent(conteudo)));

                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `token ${tokenAtual}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Salvando roteiro: ${nome}`,
                        content: contentBase64,
                        sha: sha
                    })
                });

                if (response.ok) {
                    setStatus(`✅ "${nome}" salvo com sucesso!`, 'success');
                    listarArquivos();
                } else {
                    const error = await response.json();
                    setStatus(`❌ Erro: ${error.message || 'Falha ao salvar'}`, 'error');
                }
            } catch (error) {
                setStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }

        async function carregar() {
            const nome = prompt('📂 Qual arquivo carregar?', 'meu-roteiro.txt');
            if (!nome) return;

            const tokenAtual = getToken();
            setStatus(`⏳ Carregando "${nome}"...`);

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });

                if (!response.ok) throw new Error('Arquivo não encontrado');

                const data = await response.json();
                const conteudo = decodeURIComponent(escape(atob(data.content)));
                
                editor.value = conteudo;
                nomeArquivo.value = nome;
                setStatus(`✅ "${nome}" carregado!`, 'success');
            } catch (error) {
                setStatus(`❌ Erro: ${error.message}`, 'error');
            }
        }

        async function listarArquivos() {
            setStatus('⏳ Listando arquivos...');

            try {
                const tokenAtual = getToken();
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });

                if (!response.ok) {
                    if (response.status === 404) {
                        filesDiv.innerHTML = `<p style="color: #8b949e;">📁 Ainda não há roteiros. Crie o primeiro!</p>`;
                        setStatus('📁 Nenhum roteiro encontrado', '');
                        return;
                    }
                    throw new Error('Erro ao listar');
                }

                const files = await response.json();
                
                if (files.length === 0) {
                    filesDiv.innerHTML = `<p style="color: #8b949e;">📁 Nenhum roteiro encontrado</p>`;
                    return;
                }

                filesDiv.innerHTML = files.map(file => `
                    <div class="file-item">
                        <span>📄 ${file.name}</span>
                        <div>
                            <button onclick="carregarArquivo('${file.name}')">Abrir</button>
                            <button class="danger" onclick="deletar('${file.name}')">🗑️</button>
                        </div>
                    </div>
                `).join('');
                
                setStatus(`📁 ${files.length} roteiros encontrados`, 'success');
            } catch (error) {
                filesDiv.innerHTML = `<p style="color: #8b949e;">❌ Erro ao listar arquivos</p>`;
                setStatus(`❌ ${error.message}`, 'error');
            }
        }

        async function carregarArquivo(nome) {
            const tokenAtual = getToken();
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });
                const data = await response.json();
                const conteudo = decodeURIComponent(escape(atob(data.content)));
                editor.value = conteudo;
                nomeArquivo.value = nome;
                setStatus(`✅ "${nome}" carregado!`, 'success');
            } catch (error) {
                setStatus(`❌ Erro ao carregar`, 'error');
            }
        }

        async function deletar(nome) {
            if (!confirm(`Tem certeza que quer deletar "${nome}"?`)) return;
            
            const tokenAtual = getToken();
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    headers: { 'Authorization': `token ${tokenAtual}` }
                });
                const data = await response.json();

                const deleteResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PASTA}${nome}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `token ${tokenAtual}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Deletando ${nome}`,
                        sha: data.sha
                    })
                });

                if (deleteResponse.ok) {
                    setStatus(`✅ "${nome}" deletado!`, 'success');
                    listarArquivos();
                }
            } catch (error) {
                setStatus(`❌ Erro ao deletar`, 'error');
            }
        }

        function baixar() {
            const conteudo = editor.value;
            if (!conteudo) {
                setStatus('⚠️ Roteiro vazio!', 'error');
                return;
            }
            const blob = new Blob([conteudo], {type: 'text/plain'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = nomeArquivo.value || 'meu-roteiro.txt';
            link.click();
            setStatus('⬇️ Arquivo baixado', 'success');
        }

        function limpar() {
            if (editor.value && !confirm('Tem certeza? O conteúdo atual será perdido.')) return;
            editor.value = '';
            setStatus('📝 Novo roteiro criado', '');
        }

        // Inicialização
        console.log(`📁 Repositório: ${REPO_OWNER}/${REPO_NAME}`);
        console.log(`📁 Pasta: ${PASTA}`);
    </script>
</body>
</html>
